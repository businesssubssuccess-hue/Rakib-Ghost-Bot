name: Keep Alive Ping

on:
  schedule:
    - cron: "*/10 * * * *"   # প্রতি ১০ মিনিটে একবার ping দেবে
  workflow_dispatch:           # manual trigger ও allowed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "❌ RENDER_URL secret সেট করা নেই — GitHub repo এর Settings ▸ Secrets ▸ Actions এ যোগ করো।"
            exit 0
          fi
          echo "🌐 Pinging $RENDER_URL/ping ..."
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$RENDER_URL/ping" || echo "000")
            echo "Attempt $i — HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ Bot is alive"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ Bot did not respond — Render হয়তো cold start এ আছে"
