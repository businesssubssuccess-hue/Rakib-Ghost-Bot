name: CI — Syntax Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies (no scripts)
        run: npm install --ignore-scripts --no-audit --no-fund || true

      - name: Syntax check on all command files
        run: |
          ERRORS=0
          for f in $(find scripts/cmds scripts/events -name "*.js" 2>/dev/null); do
            if ! node --check "$f" 2>/dev/null; then
              echo "❌ Syntax error: $f"
              node --check "$f"
              ERRORS=$((ERRORS+1))
            fi
          done
          for f in server.js index.js Sakura.js keep-alive.js 2>/dev/null; do
            [ -f "$f" ] || continue
            if ! node --check "$f"; then
              echo "❌ Syntax error: $f"
              ERRORS=$((ERRORS+1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "❌ Total $ERRORS syntax errors found"
            exit 1
          fi
          echo "✅ All command files passed syntax check"

      - name: Validate JSON configs
        run: |
          for f in config.json configCommands.json ghostConfig.json package.json; do
            [ -f "$f" ] || continue
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "✅ $f valid"
          done
